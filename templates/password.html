{% extends "base.html" %}
{% block content %}

<div style="max-width:380px; margin: 80px auto; text-align:center;">
  <svg width="44" height="44" viewBox="0 0 24 24" fill="#e60023" style="margin-bottom:16px;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
  <h2 style="margin-bottom:8px; font-size:1.3rem;">Accès privé</h2>
  <p style="color:#888; margin-bottom:24px; font-size:.9rem;">Entre le mot de passe pour accéder à l'app.</p>

  {% if error %}
  <div class="error" style="margin-bottom:16px;">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <input type="password" name="password" placeholder="Mot de passe" autofocus
      style="width:100%; padding:12px 16px; border:1.5px solid #ddd; border-radius:8px; font-size:1rem; margin-bottom:12px; outline:none;"
      onfocus="this.style.borderColor='#e60023'" onblur="this.style.borderColor='#ddd'">
    <button type="submit" class="btn btn-red" style="width:100%; font-size:1rem; padding:12px;">Entrer</button>
  </form>
</div>

{% endblock %}
